version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reis
      POSTGRES_PASSWORD: reis123
      POSTGRES_DB: reis_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reis -d reis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local